<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhysicsLens - Teacher Access</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans flex items-center justify-center min-h-screen p-6">
    <div class="max-w-md w-full bg-white p-6 md:p-10 rounded-2xl shadow-xl border text-center">
        <h1 class="text-3xl md:text-4xl font-extrabold text-gray-900 mb-2 tracking-tight">Teacher Portal</h1>
        <p class="text-sm md:text-base text-gray-500 mb-8">Sign in with your @moe.edu.sg Google account to manage quizzes.</p>
        
        <button id="login-google-btn" class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 py-3 px-6 rounded-xl transition-all shadow-sm">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="20">
            <span class="font-bold">Sign in as Teacher</span>
        </button>
        <div id="error-message" class="hidden mt-6 p-4 bg-red-50 text-red-600 text-sm rounded-lg border border-red-200"></div>
        
        <div class="mt-8 pt-6 border-t">
            <a href="index.html" class="text-blue-600 hover:underline text-sm font-medium">Return to Student Access</a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { firebaseConfig } from './firebase-config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();
        
        const loginBtn = document.getElementById('login-google-btn');
        const errMsg = document.getElementById('error-message');

        onAuthStateChanged(auth, (user) => {
            if (user && user.email.endsWith('@moe.edu.sg')) {
                window.location.href = 'index.html';
            }
        });

        loginBtn.onclick = () => {
            signInWithPopup(auth, googleProvider)
                .then(result => {
                    if (!result.user.email.endsWith('@moe.edu.sg')) {
                        errMsg.innerText = "Access denied. Only @moe.edu.sg accounts are allowed here.";
                        errMsg.classList.remove('hidden');
                        auth.signOut();
                    } else {
                        window.location.href = 'index.html';
                    }
                })
                .catch(err => {
                    errMsg.innerText = err.message;
                    errMsg.classList.remove('hidden');
                });
        };
    </script>
</body>
</html>
